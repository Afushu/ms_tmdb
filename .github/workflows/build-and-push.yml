name: build-and-push

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - frontend/**
      - backend/**
      - docker/**
      - .github/workflows/build-and-push.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || github.event.repository.name }}

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install deps
        env:
          SKIP_SIMPLE_GIT_HOOKS: 1
        run: pnpm -C frontend install --frozen-lockfile

      - name: Prepare Docker build version
        id: app-version
        run: |
          APP_VERSION="$(TZ=Asia/Shanghai date +%Y%m%d%H%M)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Docker build version: ${APP_VERSION}"

      - name: Build frontend
        env:
          VITE_APP_VERSION: ${{ steps.app-version.outputs.APP_VERSION }}
        run: pnpm -C frontend run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build backend (${{ matrix.arch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        working-directory: backend
        run: |
          mkdir -p ../build-artifacts/backend/${{ matrix.arch }}
          go build -trimpath -ldflags="-s -w" -o ../build-artifacts/backend/${{ matrix.arch }}/tmdb ./tmdb.go

      - name: Upload backend (${{ matrix.arch }})
        uses: actions/upload-artifact@v7
        with:
          name: backend-${{ matrix.arch }}
          path: build-artifacts/backend/${{ matrix.arch }}
          retention-days: 3

  build:
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: build-artifacts/frontend/dist

      - name: Download backend (amd64)
        uses: actions/download-artifact@v7
        with:
          name: backend-amd64
          path: build-artifacts/backend/amd64

      - name: Download backend (arm64)
        uses: actions/download-artifact@v7
        with:
          name: backend-arm64
          path: build-artifacts/backend/arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "${DOCKERHUB_USERNAME}" || { echo "::error::Missing secret DOCKERHUB_USERNAME"; exit 1; }
          test -n "${DOCKERHUB_TOKEN}" || { echo "::error::Missing secret DOCKERHUB_TOKEN"; exit 1; }

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/runtime.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
