name: build-and-push

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - backend/**
      - docker/**
      - Dockerfile
      - .github/workflows/build-and-push.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'ms_tmdb' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 生成版本号
        id: version
        run: |
          APP_VERSION="$(TZ=Asia/Shanghai date +%Y%m%d%H%M)"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "构建版本号: ${APP_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送镜像（:latest + 多架构）
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.version.outputs.APP_VERSION }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=ms_tmdb
            org.opencontainers.image.description=TMDB proxy and local enhancement platform
            org.opencontainers.image.version=${{ steps.version.outputs.APP_VERSION }}
